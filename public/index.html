<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OHTTPd — Running</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background: #0d1117;
            color: #c9d1d9;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }
        .container {
            text-align: center;
            padding: 2rem;
        }
        h1 {
            font-size: 3rem;
            font-weight: 700;
            color: #58a6ff;
            letter-spacing: -0.02em;
            margin-bottom: 0.5rem;
        }
        .version {
            font-size: 0.9rem;
            color: #8b949e;
            margin-bottom: 2rem;
        }
        .status {
            display: inline-block;
            background: #21262d;
            border: 1px solid #30363d;
            border-radius: 8px;
            padding: 1rem 2rem;
            margin-bottom: 2rem;
        }
        .status .dot {
            display: inline-block;
            width: 10px;
            height: 10px;
            background: #3fb950;
            border-radius: 50%;
            margin-right: 8px;
            animation: pulse 2s infinite;
        }
        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.4; }
        }
        .status span {
            vertical-align: middle;
        }
        p {
            color: #8b949e;
            line-height: 1.6;
        }
        a {
            color: #58a6ff;
            text-decoration: none;
        }
        a:hover {
            text-decoration: underline;
        }
        .footer {
            margin-top: 3rem;
            font-size: 0.8rem;
            color: #484f58;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>OHTTPd</h1>
        <div class="version">v1.0 — HTTP/1.1 Server</div>
        <div class="status">
            <span class="dot"></span>
            <span>Server is running</span>
        </div>
        <p>
            Your static files are being served from<br>
            the <code>public/</code> directory.
        </p>
        <div class="footer">
            Licensed under the EUPL v1.2
        </div>
    </div>
</body>
</html>
